name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      # The Supabase publishable key is safe to expose; RLS is the security boundary.
      VITE_SUPABASE_URL: https://ohaoxrteiamxcnafgkhp.supabase.co
      VITE_SUPABASE_ANON_KEY: sb_publishable_Yd7kd-I8OKAa3j2J3Qmf9g_jlBjMVO1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      # SPA fallback: GitHub Pages serves 404.html for unknown paths like /join/abc123
      - run: cp dist/index.html dist/404.html
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
